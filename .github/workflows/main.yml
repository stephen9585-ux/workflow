name: Deploy Node App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "🚀 Starting deployment..."

            cd ~

            echo "🧹 Cleaning old files..."
            rm -rf githubworkflowdoc

            echo "📦 Cloning repo..."
            git clone https://github.com/stephen9585-ux/workflow.git

            cd githubworkflowdoc/backend

            echo "🔧 Installing Node.js if not present..."
            if ! command -v node > /dev/null; then
              sudo apt update
              sudo apt install -y nodejs npm
            fi

            echo "🔧 Installing PM2 if not present..."
            if ! command -v pm2 > /dev/null; then
              sudo npm install -g pm2
            fi

            echo "📥 Installing dependencies..."
            npm install

            echo "🔁 Restarting app..."
            pm2 stop all || true
            pm2 start server.js
            pm2 save

            echo "✅ Deployment completed!"
